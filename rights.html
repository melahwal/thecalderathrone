      <a href="rights.html">Rights</a>
    </nav>

  <main>
    <section class="section contact" id="contact">
      <div class="section-heading">
        <h1 class="page-title">CONTACT / RIGHTS INQUIRY</h1>
        <h2>For literary representation, publishing, TV / film adaptation, and general contact.</h2>
      </div>
      <form class="contact-form" action="mailto:melahwal@hotmail.com?subject=The%20Caldera%20Throne%20%E2%80%94%20Rights%20Inquiry" method="post" enctype="text/plain">
        <label>Name<input type="text" name="name" autocomplete="name" required></label>
        <label>Email<input type="email" name="email" autocomplete="email" required></label>
        <label>Organization<input type="text" name="organization" autocomplete="organization"></label>
        <label>Inquiry Type<select name="inquiry-type" required>
          <option value="">Select inquiry type</option>
          <option>Literary representation</option>
          <option>Publishing inquiry</option>
          <option>TV / film adaptation inquiry</option>
          <option>General contact</option>
        </select></label>
        <label class="full">Message<textarea name="message" rows="6" required></textarea></label>
        <button class="button primary full" type="submit">Send Inquiry</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; <span data-year></span> Mustafa M. El Ahwal. All rights reserved.</p>
    <div class="footer-stats" aria-label="Visitor statistics">
      Unique Visitors: <span data-unique-visitors>Loading...</span> | Total Visits: <span data-total-visits>Loading...</span>
    </div>
    <a href="#">Return to top</a>
  </footer>

  <script>
    function loadVisitorStats() {
      const uniqueVisitors = document.querySelector("[data-unique-visitors]");
      const totalVisits = document.querySelector("[data-total-visits]");

      if (!uniqueVisitors || !totalVisits) return;

      fetch("/api/visitor-stats")
        .then(response => response.json())
        .then(data => {
          uniqueVisitors.textContent = data.uniqueVisitors;
          totalVisits.textContent = data.totalVisits;
        })
        .catch(() => {
          uniqueVisitors.textContent = "—";
          totalVisits.textContent = "—";
        });
    }

    loadVisitorStats();
  </script>
  <script src="script.js"></script>
